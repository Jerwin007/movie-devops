name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd auth-service && npm install && echo "✅ auth-service OK"
      - run: cd ml-recommender-service && npm install && echo "✅ ml-recommender OK"
      - run: cd fallback-recommender-service && npm install && echo "✅ fallback-recommender OK"
      - run: cd api-gateway && npm install && echo "✅ api-gateway OK"
      - run: cd monitoring-service && npm install && echo "✅ monitoring-service OK"

  build-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - run: |
          for svc in auth-service ml-recommender-service fallback-recommender-service ml-recommender-v2-service api-gateway monitoring-service frontend; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$svc:latest ./$svc
            docker push ${{ secrets.DOCKER_USERNAME }}/$svc:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ secrets.KUBECONFIG != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
      - run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl apply --validate=false -f k8s/namespace.yaml
          kubectl apply --validate=false -f k8s/mongo-deployment.yaml
          kubectl apply --validate=false -f k8s/auth-deployment.yaml
          kubectl apply --validate=false -f k8s/ml-recommender-deployment.yaml
          kubectl apply --validate=false -f k8s/fallback-recommender-deployment.yaml
          kubectl apply --validate=false -f k8s/api-gateway-deployment.yaml
          kubectl apply --validate=false -f k8s/frontend-deployment.yaml
          kubectl apply --validate=false -f k8s/monitoring-deployment.yaml
          kubectl apply --validate=false -f k8s/hpa.yaml