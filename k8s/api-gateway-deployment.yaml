apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: movie-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: jerwin01/api-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: JWT_SECRET
          value: "mysecret"
        - name: AUTH_URL
          value: "http://auth-service:3001"
        - name: ML_URL
          value: "http://ml-recommender-service:3002"
        - name: FALLBACK_URL
          value: "http://fallback-recommender-service:3003"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: movie-app
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
