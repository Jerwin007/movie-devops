apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-recommender-service
  namespace: movie-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-recommender-service
      version: v1
  template:
    metadata:
      labels:
        app: ml-recommender-service
        version: v1
    spec:
      containers:
      - name: ml-recommender
        image: YOUR_DOCKERHUB_USERNAME/ml-recommender-service:latest
        ports:
        - containerPort: 3002
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ml-recommender-service
  namespace: movie-app
spec:
  selector:
    app: ml-recommender-service
    version: v1
  ports:
  - port: 3002
    targetPort: 3002
