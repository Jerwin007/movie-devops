apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: movie-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-service
  template:
    metadata:
      labels:
        app: monitoring-service
    spec:
      containers:
      - name: monitoring
        image: YOUR_DOCKERHUB_USERNAME/monitoring-service:latest
        ports:
        - containerPort: 3005
        env:
        - name: AUTH_URL
          value: "http://auth-service:3001"
        - name: ML_URL
          value: "http://ml-recommender-service:3002"
        - name: FALLBACK_URL
          value: "http://fallback-recommender-service:3003"
        - name: ML_V2_URL
          value: "http://ml-recommender-v2-service:3004"
        - name: GW_URL
          value: "http://api-gateway:3000"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-service
  namespace: movie-app
spec:
  selector:
    app: monitoring-service
  ports:
  - port: 3005
    targetPort: 3005
  type: NodePort
