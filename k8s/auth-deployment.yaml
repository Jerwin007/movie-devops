apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: movie-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: jerwin01/auth-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: JWT_SECRET
          value: "mysecret"
        - name: MONGO_URI
          value: "mongodb://mongo-service:27017/movieapp"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: movie-app
spec:
  selector:
    app: auth-service
  ports:
  - port: 3001
    targetPort: 3001
